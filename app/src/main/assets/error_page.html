<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Offline</title>
<style>
  :root {
    --fg: #111;
    --bg: #fff;
    --muted: #666;
    --line: #111;
  }
  @media (prefers-color-scheme: dark) {
    :root { --fg:#eee; --bg:#000; --muted:#aaa; --line:#eee; }
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, Roboto, "Helvetica Neue", sans-serif;
    -webkit-tap-highlight-color: transparent;
  }
  body {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10vh 24px 24px;
  }
  .logo {
    width: 96px;
    height: 96px;
    margin-bottom: 24px;
    filter: grayscale(100%);
  }
  h1 {
    font-size: 22px;
    font-weight: 600;
    margin: 0 0 12px;
    text-align: center;
  }
  p.msg {
    font-size: 15px;
    color: var(--muted);
    margin: 0 0 28px;
    text-align: center;
    max-width: 420px;
    line-height: 1.5;
  }
  .url {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    margin: -16px 0 28px;
    word-break: break-all;
    max-width: 420px;
    text-align: center;
  }
  button.retry {
    appearance: none;
    -webkit-appearance: none;
    background: var(--bg);
    color: var(--fg);
    border: 2px solid var(--line);
    border-radius: 28px;
    padding: 12px 32px;
    font-size: 16px;
    font-weight: 600;
    cursor: pointer;
    min-width: 160px;
  }
  button.retry:active { background: var(--fg); color: var(--bg); }

  .game-wrap {
    margin-top: 48px;
    width: 100%;
    max-width: 560px;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  .hint {
    font-size: 12px;
    color: var(--muted);
    margin-top: 10px;
  }
  canvas {
    width: 100%;
    max-width: 560px;
    height: 160px;
    border-top: 2px solid var(--line);
    border-bottom: 2px solid var(--line);
    background: var(--bg);
    touch-action: manipulation;
    display: block;
  }
  .score {
    font-family: ui-monospace, SFMono-Regular, Menlo, monospace;
    font-size: 12px;
    color: var(--muted);
    align-self: flex-end;
    margin-bottom: 4px;
  }
  .canvas-wrap {
    position: relative;
    width: 100%;
    max-width: 560px;
  }
  .overlay {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--fg);
    font-size: 14px;
    font-weight: 600;
    border-top: 2px solid var(--line);
    border-bottom: 2px solid var(--line);
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .overlay.hidden { display: none; }
</style>
</head>
<body>
  <img class="logo" src="einkbro_logo.webp" alt="EinkBro">
  <h1 id="title">You're offline</h1>
  <p class="msg" id="message">Check your connection and try again.</p>
  <p class="url" id="failedUrl"></p>
  <button class="retry" id="retryBtn">Retry</button>

  <div class="game-wrap">
    <div class="score" id="score">0</div>
    <div class="canvas-wrap">
      <canvas id="game" width="1120" height="320"></canvas>
      <div class="overlay" id="startOverlay">Tap to play</div>
    </div>
    <div class="hint">Tap or press Space to make the horse jump</div>
  </div>

<script>
(function () {
  var params = new URLSearchParams(location.search);
  var failed = params.get('url') || '';
  var reason = params.get('reason') || '';
  if (failed) {
    document.getElementById('failedUrl').textContent = failed;
  }
  if (reason) {
    document.getElementById('message').textContent = reason;
  }
  document.getElementById('retryBtn').addEventListener('click', function () {
    location.href = 'einkbro://retry';
  });

  // --- Horse jump game ---
  var canvas = document.getElementById('game');
  var ctx = canvas.getContext('2d');
  var overlay = document.getElementById('startOverlay');
  var W = canvas.width, H = canvas.height;
  var groundY = H - 40;

  var horse = {
    x: 90, y: groundY,
    vy: 0, onGround: true,
    gallop: 0,        // continuous phase for galloping legs
    landing: 0,       // frames of crouch after touching down
    apex: 0           // peak height reached during current jump (for tuck blending)
  };
  var gravity = 0.7;
  var jumpV = -13;
  var obstacles = [];
  var speed = 6;
  var score = 0;
  var best = parseInt(localStorage.getItem('einkbroDragonBest') || '0', 10);
  var running = false;       // game-over state inside an active session
  var started = false;       // user has explicitly started the game
  var rafId = 0;
  var spawnTimer = 0;
  var scoreEl = document.getElementById('score');

  function startGame() {
    if (started) return;
    started = true;
    overlay.classList.add('hidden');
    reset();
    if (!document.hidden) scheduleFrame();
  }
  function jump() {
    if (!started) { startGame(); return; }
    if (!running) { reset(); return; }
    if (horse.onGround && horse.landing === 0) {
      horse.vy = jumpV;
      horse.onGround = false;
      horse.apex = 0;
    }
  }
  function reset() {
    obstacles = [];
    speed = 6;
    score = 0;
    spawnTimer = 0;
    horse.y = groundY;
    horse.vy = 0;
    horse.onGround = true;
    horse.gallop = 0;
    horse.landing = 0;
    horse.apex = 0;
    running = true;
  }

  overlay.addEventListener('touchstart', function (e) {
    e.preventDefault();
    startGame();
  }, { passive: false });
  overlay.addEventListener('mousedown', function (e) {
    e.preventDefault();
    startGame();
  });

  window.addEventListener('keydown', function (e) {
    if (e.code === 'Space' || e.code === 'ArrowUp') {
      e.preventDefault();
      jump();
    }
  });
  canvas.addEventListener('touchstart', function (e) {
    e.preventDefault();
    jump();
  }, { passive: false });
  canvas.addEventListener('mousedown', jump);

  // Articulated horse leg: hip at (hipX, hipY), upper rotates by hipAngle (rad,
  // 0 = straight down, +back/-forward), knee bends by kneeAngle (rad, +back).
  function drawLeg(hipX, hipY, hipAngle, kneeAngle, upper, lower) {
    ctx.save();
    ctx.translate(hipX, hipY);
    ctx.rotate(hipAngle);
    ctx.fillRect(-2.5, 0, 5, upper);
    ctx.translate(0, upper);
    ctx.rotate(kneeAngle);
    ctx.fillRect(-2, 0, 4, lower);
    // hoof
    ctx.fillRect(-3.5, lower - 2, 7, 3);
    ctx.restore();
  }

  function drawHorse(x, y) {
    var color = getComputedStyle(document.body).color;
    var bg = getComputedStyle(document.body).backgroundColor;

    ctx.save();
    ctx.translate(x, y);

    // Body pitch: head up while ascending, head down while descending.
    var pitch = 0;
    if (!horse.onGround) {
      pitch = Math.max(-0.32, Math.min(0.22, horse.vy * 0.025));
    }
    var crouch = horse.landing > 0 ? horse.landing * 0.6 : 0;
    ctx.translate(28, -46);
    ctx.rotate(pitch);
    ctx.translate(-28, 46 + crouch);

    ctx.fillStyle = color;

    // --- Compute leg poses (used for both far + near pairs) ---
    var FN = { x: 50, y: -34 };
    var FF = { x: 46, y: -34 };
    var RN = { x: 8,  y: -34 };
    var RF = { x: 4,  y: -34 };
    var upper = 17, lower = 17;
    var u = upper - crouch * 0.4;
    var l = lower - crouch * 0.4;
    var legs;

    if (horse.onGround) {
      var p = horse.gallop;
      // Each leg's hip swings; knee flexes during the airborne (recovery) half-cycle.
      function pose(phase) {
        var s = Math.sin(phase);
        return { hip: s * 0.6, knee: Math.max(0, -s) * 1.0 };
      }
      var poseFN = pose(p);
      var poseRN = pose(p + Math.PI);
      var poseFF = pose(p - 0.5);
      var poseRF = pose(p + Math.PI - 0.5);
      legs = {
        FN: { hip: poseFN.hip, knee: poseFN.knee, u: u, l: l },
        RN: { hip: poseRN.hip, knee: poseRN.knee, u: u, l: l },
        FF: { hip: poseFF.hip, knee: poseFF.knee, u: u, l: l },
        RF: { hip: poseRF.hip, knee: poseRF.knee, u: u, l: l }
      };
    } else {
      var t = Math.max(-1, Math.min(1, horse.vy / 9));
      var frontHip  = (t < 0) ? (-0.4 + t * 0.5) : (-0.9 + t * 0.4);
      var frontKnee = (t < 0) ? (1.5 + t * 0.4) : Math.max(0.2, 1.0 - t * 0.9);
      var rearHip   = (t < 0) ? (0.6 - t * 0.4) : (0.4 - t * 0.6);
      var rearKnee  = (t < 0) ? (0.4 - t * 0.5) : (1.1 - t * 0.4);
      legs = {
        FN: { hip: frontHip,        knee: frontKnee, u: upper, l: lower },
        RN: { hip: rearHip,         knee: rearKnee,  u: upper, l: lower },
        FF: { hip: frontHip + 0.05, knee: frontKnee, u: upper, l: lower },
        RF: { hip: rearHip  - 0.05, knee: rearKnee,  u: upper, l: lower }
      };
    }

    // --- Far legs (drawn behind the body) ---
    drawLeg(FF.x, FF.y, legs.FF.hip, legs.FF.knee, legs.FF.u, legs.FF.l);
    drawLeg(RF.x, RF.y, legs.RF.hip, legs.RF.knee, legs.RF.u, legs.RF.l);

    // --- Tail: long, flowing, hangs from the rump ---
    var tailSway = horse.onGround ? Math.sin(horse.gallop * 0.5) * 3 : -horse.vy * 0.5;
    ctx.beginPath();
    ctx.moveTo(-3, -50);
    ctx.bezierCurveTo(-14, -48 + tailSway * 0.3, -24, -28 + tailSway, -22, -8 + tailSway);
    ctx.lineTo(-15, -10 + tailSway);
    ctx.bezierCurveTo(-15, -28 + tailSway * 0.5, -7, -42, -3, -42);
    ctx.closePath();
    ctx.fill();

    // --- Body: single sleek elongated ellipse (flat back, no hump) ---
    ctx.beginPath();
    ctx.ellipse(28, -46, 33, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    // subtle withers peak at the front of the back (anatomically correct, not a hump)
    ctx.beginPath();
    ctx.ellipse(46, -56, 8, 4, 0, 0, Math.PI * 2);
    ctx.fill();
    // chest
    ctx.beginPath();
    ctx.ellipse(54, -42, 10, 11, 0, 0, Math.PI * 2);
    ctx.fill();

    // --- Neck: arched up from withers to head ---
    ctx.beginPath();
    ctx.moveTo(46, -56);                              // top of withers
    ctx.bezierCurveTo(54, -62, 62, -68, 68, -72);     // back of neck (concave arch)
    ctx.lineTo(74, -68);                              // top of throat where head joins
    ctx.bezierCurveTo(68, -62, 62, -52, 56, -42);     // front of neck (convex)
    ctx.closePath();
    ctx.fill();

    // --- Mane: flowing along the back/top of the neck ---
    ctx.beginPath();
    ctx.moveTo(44, -56);
    ctx.bezierCurveTo(50, -62, 58, -70, 66, -74);
    ctx.bezierCurveTo(70, -70, 66, -64, 60, -58);
    ctx.bezierCurveTo(54, -54, 48, -52, 42, -50);
    ctx.closePath();
    ctx.fill();

    // --- Head: elongated single shape with muzzle ---
    ctx.save();
    ctx.translate(70, -70);
    ctx.rotate(-0.05);
    ctx.beginPath();
    ctx.moveTo(-2, -2);
    ctx.bezierCurveTo(0, -6, 8, -5, 14, -3);          // top of skull → top of muzzle
    ctx.bezierCurveTo(20, -1, 20, 4, 14, 6);          // muzzle tip
    ctx.bezierCurveTo(8, 7, 2, 6, -2, 4);             // bottom of jaw
    ctx.bezierCurveTo(-5, 2, -5, 0, -2, -2);          // back of skull
    ctx.closePath();
    ctx.fill();
    // pointed ears
    ctx.beginPath();
    ctx.moveTo(-1, -3);
    ctx.lineTo(1, -10);
    ctx.lineTo(3, -3);
    ctx.closePath();
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(3, -3);
    ctx.lineTo(5, -10);
    ctx.lineTo(7, -3);
    ctx.closePath();
    ctx.fill();
    // eye
    ctx.fillStyle = bg;
    ctx.beginPath();
    ctx.arc(4, 0, 1.3, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = color;
    // nostril
    ctx.beginPath();
    ctx.arc(15, 4, 1, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();

    // --- Forelock between ears ---
    ctx.beginPath();
    ctx.moveTo(66, -76);
    ctx.lineTo(68, -82);
    ctx.lineTo(72, -72);
    ctx.closePath();
    ctx.fill();

    // --- Near legs (drawn on top of the body) ---
    drawLeg(FN.x, FN.y, legs.FN.hip, legs.FN.knee, legs.FN.u, legs.FN.l);
    drawLeg(RN.x, RN.y, legs.RN.hip, legs.RN.knee, legs.RN.u, legs.RN.l);

    ctx.restore();
  }

  function drawGround() {
    ctx.strokeStyle = getComputedStyle(document.body).color;
    ctx.lineWidth = 2;
    ctx.beginPath();
    ctx.moveTo(0, groundY + 1);
    ctx.lineTo(W, groundY + 1);
    ctx.stroke();
    // dashes
    ctx.lineWidth = 1;
    for (var i = 0; i < W; i += 28) {
      var o = (score * 2) % 28;
      ctx.beginPath();
      ctx.moveTo(i - o, groundY + 10);
      ctx.lineTo(i - o + 14, groundY + 10);
      ctx.stroke();
    }
  }

  function drawObstacle(o) {
    ctx.fillStyle = getComputedStyle(document.body).color;
    if (o.type === 'rock') {
      ctx.beginPath();
      ctx.moveTo(o.x, groundY);
      ctx.lineTo(o.x + o.w / 2, groundY - o.h);
      ctx.lineTo(o.x + o.w, groundY);
      ctx.closePath();
      ctx.fill();
    } else {
      // cactus-like pillar with arms
      ctx.fillRect(o.x + o.w / 2 - 4, groundY - o.h, 8, o.h);
      ctx.fillRect(o.x, groundY - o.h + 8, 6, 12);
      ctx.fillRect(o.x + o.w - 6, groundY - o.h + 14, 6, 12);
    }
  }

  function rectsHit(ax, ay, aw, ah, bx, by, bw, bh) {
    return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
  }

  function loop() {
    ctx.clearRect(0, 0, W, H);
    drawGround();

    if (running) {
      // physics
      var wasInAir = !horse.onGround;
      horse.vy += gravity;
      horse.y += horse.vy;
      if (horse.y >= groundY) {
        horse.y = groundY;
        horse.vy = 0;
        if (wasInAir) horse.landing = 6;   // brief crouch on touchdown
        horse.onGround = true;
      }
      // gallop cycle only progresses when feet are working the ground
      if (horse.onGround) {
        horse.gallop += 0.32;
        if (horse.landing > 0) horse.landing--;
      }

      // spawn
      spawnTimer--;
      if (spawnTimer <= 0) {
        var isRock = Math.random() < 0.5;
        obstacles.push({
          x: W + 20,
          w: isRock ? 34 : 22,
          h: isRock ? (22 + Math.random() * 22) : (34 + Math.random() * 20),
          type: isRock ? 'rock' : 'cactus'
        });
        spawnTimer = 60 + Math.floor(Math.random() * 60);
      }

      // move obstacles
      for (var i = obstacles.length - 1; i >= 0; i--) {
        var o = obstacles[i];
        o.x -= speed;
        if (o.x + o.w < 0) {
          obstacles.splice(i, 1);
          score++;
          if (score % 10 === 0) speed += 0.4;
        }
        // collision box for the horse (body + head)
        var dx = horse.x - 26, dy = horse.y - 50, dw = 76, dh = 50;
        if (rectsHit(dx, dy, dw, dh, o.x, groundY - o.h, o.w, o.h)) {
          running = false;
          if (score > best) {
            best = score;
            localStorage.setItem('einkbroDragonBest', String(best));
          }
        }
      }
    }

    // draw obstacles
    for (var j = 0; j < obstacles.length; j++) drawObstacle(obstacles[j]);
    drawHorse(horse.x, horse.y);

    // game over label
    if (!running) {
      ctx.fillStyle = getComputedStyle(document.body).color;
      ctx.font = 'bold 18px -apple-system, sans-serif';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over — tap to restart', W / 2, 40);
    }

    scoreEl.textContent = 'SCORE ' + String(score).padStart(4, '0') + '   BEST ' + String(best).padStart(4, '0');
    rafId = 0;
    if (started && !document.hidden) scheduleFrame();
  }

  function scheduleFrame() {
    if (rafId) return;
    rafId = requestAnimationFrame(loop);
  }
  function stopFrame() {
    if (rafId) {
      cancelAnimationFrame(rafId);
      rafId = 0;
    }
  }

  document.addEventListener('visibilitychange', function () {
    if (document.hidden) {
      stopFrame();
    } else if (started) {
      scheduleFrame();
    }
  });
  window.addEventListener('pagehide', stopFrame);
  window.addEventListener('beforeunload', stopFrame);
})();
</script>
</body>
</html>

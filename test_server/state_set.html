<!DOCTYPE html>
<html>
<head><meta name="viewport" content="width=device-width, initial-scale=1"><title>state set</title></head>
<body>
<h1>State Set Test</h1>
<div id="state" style="font-size: 24px;"></div>
<script>
  document.cookie = "einkbro_test=logged_in; max-age=86400; path=/";
  localStorage.setItem('einkbro_ls_token', 'session_abc123');
  var msg = 'cookie=[' + document.cookie + '] ls=[' + localStorage.getItem('einkbro_ls_token') + ']';
  document.getElementById('state').textContent = msg;
  document.title = 'SET ' + msg;
</script>
</body>
</html>
